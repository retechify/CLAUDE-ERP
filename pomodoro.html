<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 350px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .timer {
            font-size: 6em;
            font-weight: bold;
            color: #333;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: #4CAF50;
            color: white;
        }

        .start-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .pause-btn {
            background: #ff9800;
            color: white;
        }

        .pause-btn:hover {
            background: #e68900;
            transform: scale(1.05);
        }

        .reset-btn {
            background: #f44336;
            color: white;
        }

        .reset-btn:hover {
            background: #da190b;
            transform: scale(1.05);
        }

        .task-input {
            margin-top: 30px;
            padding: 15px;
            width: 100%;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        .task-input:focus {
            border-color: #667eea;
        }

        .progress-ring {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring-circle {
            fill: none;
            stroke-width: 8;
        }

        .progress-ring-circle-bg {
            stroke: #eee;
        }

        .progress-ring-circle-progress {
            stroke: #667eea;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .mode-label {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🍅 Pomodoro Timer</h1>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="work" data-time="25">Work (25m)</button>
            <button class="mode-btn" data-mode="short" data-time="5">Short Break (5m)</button>
            <button class="mode-btn" data-mode="long" data-time="15">Long Break (15m)</button>
        </div>

        <div class="mode-label" id="modeLabel">Work Time</div>

        <div class="progress-ring">
            <svg width="250" height="250">
                <circle class="progress-ring-circle progress-ring-circle-bg" cx="125" cy="125" r="110"></circle>
                <circle class="progress-ring-circle progress-ring-circle-progress" cx="125" cy="125" r="110"
                    stroke-dasharray="691" stroke-dashoffset="0"></circle>
            </svg>
            <div class="timer-text" id="timer">25:00</div>
        </div>

        <div class="controls">
            <button class="start-btn" id="startBtn">Start</button>
            <button class="pause-btn" id="pauseBtn" style="display: none;">Pause</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <input type="text" class="task-input" id="taskInput" placeholder="What are you working on?">
    </div>

    <script>
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let timerId = null;
        let isRunning = false;
        let currentMode = 'work';

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const modeLabel = document.getElementById('modeLabel');
        const progressCircle = document.querySelector('.progress-ring-circle-progress');
        const modeBtns = document.querySelectorAll('.mode-btn');

        const circumference = 2 * Math.PI * 110;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            const progress = (totalTime - timeLeft) / totalTime;
            const offset = circumference - (progress * circumference);
            progressCircle.style.strokeDashoffset = offset;
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                startBtn.style.display = 'none';
                pauseBtn.style.display = 'inline-block';
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        isRunning = false;
                        startBtn.style.display = 'inline-block';
                        pauseBtn.style.display = 'none';
                        playNotificationSound();
                        alert('Time is up!');
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                startBtn.style.display = 'inline-block';
                pauseBtn.style.display = 'none';
                startBtn.textContent = 'Resume';
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = totalTime;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            startBtn.textContent = 'Start';
            updateDisplay();
        }

        function switchMode(mode, minutes) {
            currentMode = mode;
            totalTime = minutes * 60;
            timeLeft = totalTime;
            resetTimer();

            modeBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            switch (mode) {
                case 'work':
                    modeLabel.textContent = 'Work Time';
                    progressCircle.style.stroke = '#667eea';
                    break;
                case 'short':
                    modeLabel.textContent = 'Short Break';
                    progressCircle.style.stroke = '#4CAF50';
                    break;
                case 'long':
                    modeLabel.textContent = 'Long Break';
                    progressCircle.style.stroke = '#2196F3';
                    break;
            }
        }

        function playNotificationSound() {
            const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUqXh8bllHAU2kNbxz4AxBSh+zPLaizsIHGu98+OWT');
            audio.play().catch(e => console.log('Audio play failed:', e));
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        modeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                switchMode(e.target.dataset.mode, parseInt(e.target.dataset.time));
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            } else if (e.code === 'KeyR') {
                resetTimer();
            }
        });
    </script>
</body>

</html>
